<mat-form-field appearance="fill" *ngIf="resourceId"
                [matTooltip]="resourceDescription || ''" matTooltipPosition="above">
    <mat-label *ngIf="!hideName && resourceName">{{ resourceName }}</mat-label>

    <ng-container *ngIf="resourceSchema.value_validator?.type === 'or'; else numberInput">
      <mat-select
        [disabled]="!!disabled"
        [(ngModel)]="resourceData"
        (selectionChange)="changed.emit(resourceData)"
        (focus)="onFocus()"
        (blur)="onBlur()">
        <mat-option *ngFor="let v of resourceSchema.value_validator.possible_values" [value]="v">{{ v }}</mat-option>
      </mat-select>
    </ng-container>

    <ng-template #numberInput>
      <input matInput type="number"
             [max]="resourceSchema.max_value"
             [min]="resourceSchema.min_value"
             [step]="resourceSchema.value_interval"
             [disabled]="disabled || resourceSchema.value_validator?.type === 'eq'"
             [(ngModel)]="resourceData"
             (ngModelChange)="changed.emit(resourceData)"
             (focus)="onFocus()"
             (blur)="onBlur()">
    </ng-template>
</mat-form-field>
