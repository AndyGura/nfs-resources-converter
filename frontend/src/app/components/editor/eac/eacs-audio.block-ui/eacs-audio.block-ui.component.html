<div id='header'>
  <mat-label *ngIf='!hideName && resourceName'
             [matTooltip]='resourceDescription || ""' matTooltipPosition='above'>{{ resourceName }}
  </mat-label>
  <audio controls *ngIf='audioUrl$ | async'>
    <source [src]='audioUrl$ | async'>
    Your browser does not support the audio element.
  </audio>
  <mat-spinner *ngIf='resourceId && !(audioUrl$ | async)' mode='indeterminate'></mat-spinner>
  <div class='flex-spacer'></div>
  <app-block-actions *ngIf='!hideBlockActions' [resource]='{
                      id: resourceId!,
                      name: resourceName!,
                      data: resourceData,
                      schema: resourceSchema,
                     }'></app-block-actions>
</div>
<app-compound-block-ui [resourceId]="resourceId"
                       [resourceName]="resourceName"
                       [resourceSchema]="resourceSchema"
                       [resourceData]="resourceData"
                       [hideName]='true'
                       [hideBlockActions]='true'></app-compound-block-ui>
