<mat-tab-group class="font-editor-tabs" *ngIf="resource">
  <mat-tab label="Font">
    <div class="font-editor-container">
      <div class="top-section">
        <div class="top-left">
          <div class="tab-content">
            <app-compound-block-ui [resource]="resource"
                                   [fieldBlacklist]="['bitmap', 'definitions', 'kernings']"
                                   [hideBlockActions]="true"
                                   (changed)="changed.emit()"></app-compound-block-ui>
          </div>
        </div>

        <div class="top-center">
          <div class="text-preview-container">
            <div class="preview-title">Font Preview</div>
            <textarea (input)="onTextChange($event)">{{ _text$.getValue() }}</textarea>
            <div class="canvas-scroll-container">
              <div #textPreviewContainer class="pixi-container"></div>
            </div>
          </div>
        </div>

        <div class="top-right">
          <div class="preview-container">
            <div class="preview-title">Char Preview</div>
            <canvas #fullBitmapCanvas></canvas>
          </div>
        </div>
      </div>

      <div class="bottom-section">
        <div class="tables-row">
          <div class="table-container">
            <h3>Glyphs</h3>
            <data-table [data]="glyphsWithSymbols"
                        [renderIndexes]="_renderIndexesGlyphs"
                        [columns]="_glyphColumns"
                        [enableArrayEditing]="true"
                        (addItem)="addGlyph()"
                        (removeItem)="removeGlyph($event)"
                        (moveItemUp)="moveGlyphUp($event)"
                        (moveItemDown)="moveGlyphDown($event)"
                        (dataChanged)="onGlyphDataChanged($event)"
                        (focusedElement)="onGlyphFocused($event)"></data-table>
          </div>

          <div class="table-container">
            <h3>Kernings</h3>
            <data-table [data]="kerningsWithSymbols"
                        [renderIndexes]="_renderIndexesKernings"
                        [columns]="_kerningColumns"
                        [enableArrayEditing]="true"
                        (addItem)="addKerning()"
                        (removeItem)="removeKerning($event)"
                        (moveItemUp)="moveKerningUp($event)"
                        (moveItemDown)="moveKerningDown($event)"
                        (dataChanged)="onKerningDataChanged($event)"></data-table>
          </div>
        </div>
      </div>
    </div>
  </mat-tab>
  <mat-tab label="Bitmap">
    <div class="tab-content">
      <app-compound-block-ui [resource]="resource"
                             [fieldWhitelist]="['bitmap']"
                             [hideBlockActions]="true"
                             (changed)="changed.emit()"></app-compound-block-ui>
    </div>
  </mat-tab>
</mat-tab-group>
