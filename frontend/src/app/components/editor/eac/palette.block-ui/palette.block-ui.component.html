<app-compound-block-ui [resource]="resource"
                       [hideBlockActions]='hideBlockActions'
                       [hideName]='hideName'
                       [fieldBlacklist]="['colors']"></app-compound-block-ui>
<div id="colors-container">
    <div *ngFor="let color of resourceData?.colors.data; let i = index" class="color-box"
         [ngStyle]="{'background-color': '#' + lpad(color.toString(16), '0', 8) }"
         [matTooltip]="i + ': #' + color.toString(16)"
         (click)="onColorClicked($any($event.currentTarget!), i)">
    </div>
  <div class="color-box extra-btn" (click)="addColor()" matTooltip="Add color">
    <mat-icon>add</mat-icon>
  </div>
  <div class="color-box extra-btn" (click)="removeLastColor()" matTooltip="Delete last color">
    <mat-icon>delete</mat-icon>
  </div>
</div>
<input class="hidden" matInput [ngxMatColorPicker]="picker" (colorChange)="onColorChange($event.value)">
<ngx-mat-color-picker #picker></ngx-mat-color-picker>
