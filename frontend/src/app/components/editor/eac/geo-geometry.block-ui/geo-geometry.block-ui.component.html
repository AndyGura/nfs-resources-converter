<app-obj-viewer [paths]="previewPaths$ | async"
                [viewFilters]="[previewViewFilter]"
                [visibilityGroupFunction]="previewObjectGroupFunc"
                [customControls]="customControls"
                (onObjectLoaded)="onObjectLoaded($event)"></app-obj-viewer>
<app-compound-block-ui *ngIf="!(main.hideHiddenFields$ | async)"
                       [resource]="_resource$ | async"></app-compound-block-ui>
