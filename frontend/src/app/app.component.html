<ng-container *ngIf="mainService.api.openedResourcePath$ | async; else landingPage">
  <mat-toolbar color="primary">
    <ng-container *ngTemplateOutlet="appMenu"></ng-container>
    <span class="flex-spacer"></span>
    <app-block-actions [resource]="this.mainService.resource$ | async"></app-block-actions>
    <mat-divider vertical></mat-divider>
    <ng-container *ngIf="!isProduction">
      <button mat-button [matMenuTriggerFor]="stagedChangesMenu"
              [disabled]="getStagedChangesCount(mainService.stagedChanges$ | async) === 0">
        Staged changes ({{ getStagedChangesCount(mainService.stagedChanges$ | async) }})
      </button>
      <mat-menu #stagedChangesMenu="matMenu">
        <ng-container *ngFor="let change of (mainService.stagedChanges$ | async | keyvalue)">
          <button mat-menu-item *ngIf="change.key !== '__has_external_changes__'"
                  [disabled]="true" style="opacity: 1; cursor: default;">
            <span>{{ formatChangeId(change.key) }} -> {{ change.value }}</span>
          </button>
        </ng-container>
      </mat-menu>
    </ng-container>
    <button mat-icon-button (click)="saveResource()"
            [disabled]="!(mainService.resource$ | async) || !(mainService.hasUnsavedChanges$ | async) || (mainService.isSaving$ | async)"
            matTooltip="Save changes to file">
      <mat-icon *ngIf="!(mainService.isSaving$ | async)" fontIcon="save"></mat-icon>
      <mat-spinner *ngIf="mainService.isSaving$ | async" mode="indeterminate" [diameter]="24" color="accent"></mat-spinner>
    </button>
  </mat-toolbar>
  <div id="viewport">
    <app-navigation-bar
      *ngIf="!(navigation.resourceToRender$ | async)?.schema?.hide_navigation_bar"></app-navigation-bar>
    <div id="content-wrapper">
      <div class="scroll-bounds-snapper"></div>
      <app-editor [resource]="(mainService.customActionRunning$ | async)
      ? null
      : ((navigation.resourceToRender$ | async) || (mainService.resource$ | async) || (mainService.error$ | async))"
                  [hideName]="true"
                  [hideBlockActions]="(navigation.navigationPath$ | async)?.length == 0"></app-editor>
      <div class="scroll-bounds-snapper"></div>
    </div>
  </div>
</ng-container>

<ng-template #landingPage>
  <div class="top-bar-container">
    <mat-toolbar color="primary">
      <ng-container *ngTemplateOutlet="appMenu"></ng-container>
      <span class="flex-spacer"></span>
      <span>NFS Resources Converter</span>
    </mat-toolbar>
  </div>
  <app-landing-page></app-landing-page>
</ng-template>

<ng-template #appMenu>
  <button mat-button [matMenuTriggerFor]="fileMenu">File</button>
  <mat-menu #fileMenu="matMenu">
    <button mat-menu-item (click)="openFile()">
      <mat-icon>folder_open</mat-icon>
      <span>Open</span>
    </button>
    <button mat-menu-item [matMenuTriggerFor]="recentFilesMenu"
            [disabled]="(mainService.api.recentFiles$ | async)?.length === 0">
      <mat-icon>history</mat-icon>
      <span>Recent Files</span>
    </button>
    <mat-menu #recentFilesMenu="matMenu">
      <button mat-menu-item *ngFor="let file of (mainService.api.recentFiles$ | async)" (click)="openRecentFile(file)">
        <span>{{ getFileName(file) }}</span>
      </button>
    </mat-menu>
    <button mat-menu-item (click)="closeFile()" [disabled]="!(mainService.api.openedResourcePath$ | async)">
      <mat-icon>close</mat-icon>
      <span>Close</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="saveResource()"
            [disabled]="!(mainService.resource$ | async) || !(mainService.hasUnsavedChanges$ | async) || (mainService.isSaving$ | async)">
      <mat-icon *ngIf="!(mainService.isSaving$ | async)">save</mat-icon>
      <mat-progress-spinner *ngIf="mainService.isSaving$ | async" [diameter]="24" mode="indeterminate" style="margin-right: 16px; display: inline-block; vertical-align: middle;"></mat-progress-spinner>
      <span>Save</span>
    </button>
    <button mat-menu-item (click)="reloadResource()"
            [disabled]="!(this.mainService.api.openedResourcePath$ | async)">
      <mat-icon>refresh</mat-icon>
      <span>Reload from disk</span>
    </button>
  </mat-menu>
  <button mat-button [matMenuTriggerFor]="viewMenu">View</button>
  <mat-menu #viewMenu="matMenu">
    <button mat-menu-item (click)="toggleUnknownsVisibility()">
      <mat-icon *ngIf="mainService.hideHiddenFields$ | async">visibility_off</mat-icon>
      <mat-icon *ngIf="!(mainService.hideHiddenFields$ | async)">visibility</mat-icon>
      <span>Toggle Hidden Fields</span>
    </button>
  </mat-menu>
  <button mat-button [matMenuTriggerFor]="toolsMenu">Tools</button>
  <mat-menu #toolsMenu="matMenu">
    <button mat-menu-item (click)="openConverter()">
      <mat-icon>transform</mat-icon>
      <span>Converter to common formats</span>
    </button>
    <button mat-menu-item (click)="openConfig()">
      <mat-icon>settings</mat-icon>
      <span>System Configuration</span>
    </button>
  </mat-menu>
  <button mat-button [matMenuTriggerFor]="aboutMenu">About</button>
  <mat-menu #aboutMenu="matMenu">
    <button mat-menu-item (click)='openHomePage()'>
      <mat-icon>home</mat-icon>
      <span>Home Page</span>
    </button>
    <button mat-menu-item (click)='openDocs()'>
      <mat-icon>build</mat-icon>
      <span>File specs</span>
    </button>
    <button mat-menu-item (click)='openBmac()'>
      <mat-icon>support</mat-icon>
      <span>Support me</span>
    </button>
    <span *ngIf="mainService.api.version$ | async as version" class="app-version">v{{ version }}</span>
  </mat-menu>
</ng-template>
