name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/dist/**'
      - 'version.py'

jobs:
  release:
    if: "contains(github.event.head_commit.message, '[release]')"
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(python3 -c "from version import __version__; print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"

  build:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: nfs-resources-converter-linux
          - os: windows-latest
            artifact_name: nfs-resources-converter-windows.exe
          - os: macos-latest
            artifact_name: nfs-resources-converter-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          pyinstaller nfs-resources-converter.spec
          # Create .deb package using fpm
          sudo apt-get update && sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
          mkdir -p package/usr/lib/nfs-resources-converter
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/mime/packages
          cp -r dist/nfs-resources-converter/* package/usr/lib/nfs-resources-converter/
          ln -s /usr/lib/nfs-resources-converter/nfs-resources-converter package/usr/bin/nfs-resources-converter
          cp nfs-resources-converter.desktop package/usr/share/applications/
          cp nfs-resources-converter-mime.xml package/usr/share/mime/packages/
          fpm -s dir -t deb -n nfs-resources-converter -v ${{ needs.release.outputs.version }} \
            --description "NFS Resources Converter" \
            -p dist/nfs-resources-converter-linux.deb \
            package/=/
          # Also keep the single executable if needed, but the user asked for installer.
          # We'll provide both or just the deb. Let's provide the deb as the primary.

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller nfs-resources-converter.spec
          # PyInstaller with the updated spec creates dist/nfs-resources-converter/nfs-resources-converter.exe
          # Need to adjust the .iss file or the build.
          # Let's use the one-file mode for the installer to keep it simple, 
          # OR use the directory. Inno Setup can handle directories.
          # I'll modify the .iss to use the directory if I wanted, but let's stick to onefile for the .iss for now
          # Wait, I changed the spec to one-dir (COLLECT).
          # Let's change it back to onefile for Windows/Linux or handle one-dir in installers.
          # One-dir is better for performance.
          iscc windows-installer.iss /DAppVersion=${{ needs.release.outputs.version }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller nfs-resources-converter.spec
          # This creates "NFS Resources Converter.app" in dist/
          # Create DMG
          brew install create-dmg
          create-dmg \
            --volname "NFS Resources Converter" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "NFS Resources Converter.app" 200 190 \
            --hide-extension "NFS Resources Converter.app" \
            --app-drop-link 600 185 \
            "dist/nfs-resources-converter-macos.dmg" \
            "dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/nfs-resources-converter-windows-setup.exe

  publish:
    needs: [release, build]
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          name: v${{ needs.release.outputs.version }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    needs: publish
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          OLD=$(python3 -c "from version import __version__; print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/__version__ = '.*'/__version__ = '$NEW'/" version.py
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push
